[env:tdongle_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; ESP32-S3 USB HID requires TinyUSB mode. CDC-on-boot keeps serial logs available.
build_unflags =
  -DARDUINO_USB_MODE=1
build_flags =
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DUSB_MANUFACTURER='"LilyGo"'
  -DUSB_PRODUCT='"T-Dongle S3 Remote HID"'
